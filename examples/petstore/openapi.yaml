openapi: "3.0.0"
info:
  title: Petstore API
  version: "1.0.0"
servers:
  - url: "https://petstore3.swagger.io/api/v3"
    description: Petstore server

paths:
  /pet:
    post:
      operationId: createPet
      summary: Create a new pet
      tags:
        - pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"

  /pet/{petId}:
    get:
      operationId: getPetById
      summary: Get pet by ID
      tags:
        - pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Pet found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"

  /pet/findByStatus:
    get:
      operationId: findPetsByStatus
      summary: Find pets by status
      tags:
        - pet
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Pet list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"

components:
  schemas:
    Pet:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        status:
          type: string
          enum:
            - available
            - pending
            - sold