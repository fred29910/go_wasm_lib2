{
  "version": 2,
  "updates": [
    {
      "package-ecosystem": "gomod",
      "directory": "/",
      "schedule": {
        "interval": "weekly",
        "day": "monday"
      },
      "open-pull-requests-limit": 5,
      "labels": ["dependencies", "go"],
      "commit-message": {
        "prefix": "chore(deps)",
        "include": "scope"
      }
    },
    {
      "package-ecosystem": "npm",
      "directory": "/",
      "schedule": {
        "interval": "weekly",
        "day": "monday"
      },
      "open-pull-requests-limit": 5,
      "labels": ["dependencies", "npm"],
      "commit-message": {
        "prefix": "chore(deps)",
        "include": "scope"
      }
    },
    {
      "package-ecosystem": "github-actions",
      "directory": "/",
      "schedule": {
        "interval": "weekly",
        "day": "monday"
      },
      "open-pull-requests-limit": 5,
      "labels": ["dependencies", "ci"],
      "commit-message": {
        "prefix": "chore(deps)",
        "include": "scope"
      }
    }
  ]
}
