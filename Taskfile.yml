# Taskfile.yml for go_wasm_lib2 - Generic WASM HTTP SDK Generator
# Install Task: https://taskfile.dev/installation/

version: '3'

vars:
  BUILD_DIR: build
  CLI_BINARY: '{{.BUILD_DIR}}/gowasm'
  WASM_BINARY: '{{.BUILD_DIR}}/main.wasm'
  TINY_WASM_BINARY: '{{.BUILD_DIR}}/tinymain.wasm'
  SPEC: ""
  OUT: ""

tasks:
  default:
    desc: List all available tasks
    cmds:
      - "task --list-all"

  # Build Tasks
  build:
    desc: Build CLI binary
    cmds:
      - "echo 'Building CLI binary...'"
      - 'go build -trimpath -ldflags="-s -w" -o {{.CLI_BINARY}} ./cmd/generator'
      - "echo 'CLI binary built: {{.CLI_BINARY}}'"
      - "ls -lh {{.CLI_BINARY}}"
    sources:
      - '**/*.go'
    generates:
      - '{{.CLI_BINARY}}'

  build:wasm:
    desc: Build with standard Go compiler (WASM)
    env:
      GOOS: js
      GOARCH: wasm
    cmds:
      - "echo 'Building with standard Go compiler...'"
      - 'go build -trimpath -ldflags="-s -w" -o {{.WASM_BINARY}} ./cmd/runtime'
      - "echo 'Standard Go WASM built: {{.WASM_BINARY}}'"
      - "ls -lh {{.WASM_BINARY}}"
    sources:
      - '**/*.go'
    generates:
      - '{{.WASM_BINARY}}'

  build:tinygo:
    desc: Build with TinyGo compiler (smaller WASM output)
    cmds:
      - "echo 'Building with TinyGo compiler...'"
      - "tinygo build -o {{.TINY_WASM_BINARY}} -target=wasm ./cmd/runtime"
      - "echo 'TinyGo WASM built: {{.TINY_WASM_BINARY}}'"
      - "ls -lh {{.TINY_WASM_BINARY}}"
    sources:
      - '**/*.go'
    generates:
      - '{{.TINY_WASM_BINARY}}'

  build:all:
    desc: Build CLI binary + WASM variants
    cmds:
      - task: build
      - task: build:wasm
      - task: build:tinygo

  # Dependency Management
  deps:
    desc: Download and tidy dependencies
    cmds:
      - "go mod tidy"
      - "go mod download"

  # Code Generation
  generate:
    desc: Generate SDK from OpenAPI spec (requires SPEC and OUT)
    deps: [build:runtime]
    cmds:
      - |
        if [ -z "{{.SPEC}}" ]; then
          echo "Usage: task generate SPEC=path/to/openapi.yaml OUT=./output"
          exit 1
        fi
      - "mkdir -p {{.OUT}}"
      - "go run ./cmd/generator -spec={{.SPEC}} -out={{.OUT}}"

  dev:generate:
    desc: Generate SDK for petstore example
    deps: [build:runtime]
    cmds:
      - "mkdir -p examples/petstore/generated"
      - "go run ./cmd/generator generate -spec=examples/petstore/openapi.yaml -out=examples/petstore/generated"

  build:runtime:
    desc: Build the runtime for code generation
    cmds:
      - "go build ./cmd/generator"

  # Testing & Validation
  test:
    desc: Run Go tests
    cmds:
      - "go test ./..."

  lint:ts:
    desc: Lint generated TypeScript files with oxlint (pass OUT=dir to scan specific dir)
    cmds:
      - "npm install"
      - "npx oxlint -c oxlintrc.json --no-ignore {{.OUT | default \"examples/petstore/generated\"}}"

  lint:ts:fix:
    desc: Lint and auto-fix generated TypeScript files with oxlint
    cmds:
      - "npm install"
      - "npx oxlint -c oxlintrc.json --no-ignore {{.OUT | default \"examples/petstore/generated\"}} --fix"

  test:compile:
    desc: Test compilation without running
    cmds:
      - "go build -trimpath -o /dev/null ./cmd/generator"
      - "echo 'CLI binary compilation successful'"
      - "GOOS=js GOARCH=wasm go build -trimpath -o /dev/null ./cmd/runtime"
      - "echo 'Standard Go WASM compilation successful'"
      - "tinygo build -o /dev/null -target=wasm ./cmd/runtime 2>/dev/null || echo 'TinyGo compilation test skipped (not installed)'"
      - "echo 'Compilation tests passed'"

  verify:
    desc: Verify the project builds correctly
    cmds:
      - "echo '=== Verifying project ==='"
      - task: deps
      - task: build
      - task: build:wasm
      - task: test:compile
      - task: dev:generate
      - task: lint:ts
      - "echo '=== All verifications passed ==='"

  # TinyGo Management
  install:tinygo:macos:
    desc: Install TinyGo on macOS
    cmds:
      - "brew install tinygo"

  install:tinygo:linux:
    desc: Install TinyGo on Linux
    cmds:
      - "wget https://github.com/tinygo-org/tinygo/releases/download/v0.41.1/tinygo_0.41.1_amd64.deb"
      - "sudo dpkg -i tinygo_0.41.1_amd64.deb"
      - "rm tinygo_0.41.1_amd64.deb"

  verify:tinygo:
    desc: Verify TinyGo installation
    cmds:
      - "tinygo version"

  # Cleanup
  clean:
    desc: Remove build artifacts
    cmds:
      - "echo 'Cleaning build artifacts...'"
      - "rm -rf {{.BUILD_DIR}}/"
      - "rm -f *.wasm"
      - "echo 'Clean complete'"

  clean:all:
    desc: Deep clean including generated files
    cmds:
      - task: clean
      - "echo 'Removing generated SDK files...'"
      - "rm -rf examples/*/generated/"
      - "echo 'Deep clean complete'"

  # Development Helpers
  run:generator:
    desc: Run generator CLI with custom args (args="...")
    cmds:
      - "go run ./cmd/generator {{.args}}"

  dev:
    desc: Start development workflow
    cmds:
      - task: deps
      - task: build
      - task: dev:generate

  # Help
  help:
    desc: Show help information
    cmds:
      - "echo"
      - "echo '=== go_wasm_lib2 - Generic WASM HTTP SDK Generator ==='"
      - "echo"
      - "echo 'Build Commands:'"
      - "echo '  task build              - Build CLI binary'"
      - "echo '  task build:wasm         - Build with standard Go (WASM)'"
      - "echo '  task build:tinygo       - Build with TinyGo (WASM)'"
      - "echo '  task build:all          - Build CLI + WASM variants'"
      - "echo"
      - "echo 'Code Generation:'"
      - "echo '  task generate SPEC=... OUT=...  - Generate from OpenAPI spec'"
      - "echo '  task dev:generate               - Generate petstore example'"
      - "echo"
      - "echo 'Testing:'"
      - "echo '  task test               - Run Go tests'"
      - "echo '  task test:compile       - Test compilation'"
      - "echo '  task verify             - Full verification'"
      - "echo"
      - "echo 'Maintenance:'"
      - "echo '  task deps               - Download dependencies'"
      - "echo '  task clean              - Clean build artifacts'"
      - "echo '  task clean:all          - Deep clean'"
      - "echo"
